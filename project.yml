name: iTransfer
options:
  bundleIdPrefix: com.itransfer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  iTransfer:
    type: application
    platform: iOS
    sources:
      - iTransfer
    settings:
      base:
        INFOPLIST_FILE: iTransfer/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.itransfer.app
        PRODUCT_NAME: iTransfer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "iTransfer 需要本地网络权限以通过 HTTP/FTP 共享文件。"
        INFOPLIST_KEY_UIBackgroundModes: ["fetch", "processing"]
